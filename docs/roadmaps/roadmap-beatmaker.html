<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap Beatmaker Legend</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0805;
    --bg2: #110e08;
    --bg3: #1a1510;
    --border: rgba(255,180,60,0.08);
    --border2: rgba(255,180,60,0.18);
    --text: #f0e8d8;
    --muted: #8a7560;
    --accent: #ff9d00;
    --accent2: #ff4f4f;
    --accent3: #ffe066;
    --accent4: #ff6b6b;
    --accent5: #c084fc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    padding: 3rem 2rem 2rem;
    text-align: center;
    border-bottom: 0.5px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 350px;
    background: radial-gradient(ellipse, rgba(255,157,0,0.12) 0%, rgba(255,79,79,0.06) 40%, transparent 70%);
    pointer-events: none;
  }
  .header-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    border: 0.5px solid var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 1rem;
    letter-spacing: 0.08em;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 0.75rem;
  }
  .header h1 span { color: var(--accent); }
  .header p {
    color: var(--muted);
    font-size: 14px;
    max-width: 500px;
    margin: 0 auto 1.5rem;
  }
  .waveform {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 3px;
    margin-bottom: 1.5rem;
    height: 24px;
  }
  .waveform-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--accent);
    opacity: 0.5;
    animation: wave 1.2s ease-in-out infinite;
  }
  @keyframes wave {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(2.5); }
  }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 0;
    justify-content: center; flex-wrap: wrap;
  }
  .stat {
    padding: 0.5rem 1.5rem;
    border-right: 0.5px solid var(--border);
    text-align: center;
  }
  .stat:last-child { border-right: none; }
  .stat-n {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem; font-weight: 700;
    color: var(--accent);
  }
  .stat-l { font-size: 11px; color: var(--muted); }

  /* PROGRESS */
  .progress-wrap {
    padding: 1.25rem 2rem;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg2);
    position: sticky; top: 0; z-index: 100;
  }
  .progress-row { display: flex; align-items: center; gap: 1rem; }
  .progress-track {
    flex: 1; height: 4px;
    background: var(--bg3); border-radius: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 10px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--muted); white-space: nowrap;
  }
  .xp-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--accent3);
    border: 0.5px solid var(--accent3);
    padding: 2px 8px; border-radius: 20px;
  }

  /* LAYOUT */
  .container { display: flex; min-height: calc(100vh - 180px); }

  /* SIDEBAR */
  .sidebar {
    width: 220px; flex-shrink: 0;
    border-right: 0.5px solid var(--border);
    padding: 1.5rem 0;
    position: sticky; top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
    background: var(--bg2);
  }
  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.1em;
    padding: 0 1.25rem; margin-bottom: 0.75rem;
    text-transform: uppercase;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 0.6rem 1.25rem; cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    font-size: 13px; color: var(--muted);
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { border-left-color: var(--accent); color: var(--text); background: rgba(255,157,0,0.07); }
  .nav-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border2); flex-shrink: 0;
    transition: background 0.2s;
  }
  .nav-item.active .nav-dot { background: var(--accent); }
  .nav-item.done .nav-dot { background: var(--accent3); }
  .nav-weeks {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted); margin-left: auto;
  }

  /* MAIN */
  .main { flex: 1; padding: 2rem; overflow-y: auto; }

  /* PHASE */
  .phase { display: none; }
  .phase.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .phase-header {
    display: flex; align-items: flex-start; gap: 1.25rem;
    margin-bottom: 2rem; padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
  }
  .phase-icon {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .phase-meta { flex: 1; }
  .phase-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted); margin-bottom: 4px;
  }
  .phase-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem; font-weight: 700;
    line-height: 1.2; margin-bottom: 6px;
  }
  .phase-desc { color: var(--muted); font-size: 13px; max-width: 520px; }
  .phase-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .tag {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }

  /* WEEKS GRID */
  .weeks-grid { display: flex; flex-direction: column; gap: 1rem; }

  .week-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 12px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .week-card:hover { border-color: var(--border2); }
  .week-card.completed { border-color: rgba(255,224,102,0.25); }

  .week-header {
    display: flex; align-items: center; gap: 12px;
    padding: 1rem 1.25rem; cursor: pointer; user-select: none;
  }
  .week-check {
    width: 20px; height: 20px; border-radius: 6px;
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer;
    transition: all 0.2s; font-size: 12px;
  }
  .week-check.done { background: rgba(255,224,102,0.15); border-color: var(--accent3); color: var(--accent3); }
  .week-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 15px; flex: 1; }
  .week-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted); white-space: nowrap;
  }
  .week-toggle { color: var(--muted); font-size: 16px; transition: transform 0.2s; }
  .week-card.open .week-toggle { transform: rotate(180deg); }

  .week-body {
    display: none; padding: 0 1.25rem 1.25rem;
    border-top: 0.5px solid var(--border);
  }
  .week-card.open .week-body { display: block; }

  .goal-list {
    margin: 1rem 0; display: flex; flex-direction: column; gap: 6px;
  }
  .goal {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 13px; color: var(--muted);
  }
  .goal::before { content: '→'; color: var(--accent); flex-shrink: 0; margin-top: 1px; }

  /* RESOURCES */
  .res-section { margin-top: 1rem; }
  .res-section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px;
  }
  .res-grid { display: flex; flex-direction: column; gap: 6px; }
  .res-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: var(--bg3);
    border-radius: 8px; border: 0.5px solid var(--border);
    text-decoration: none; color: var(--text);
    transition: all 0.15s; font-size: 13px;
  }
  .res-item:hover { border-color: var(--border2); background: rgba(255,255,255,0.03); }
  .res-type {
    font-family: 'DM Mono', monospace;
    font-size: 10px; padding: 2px 7px;
    border-radius: 4px; flex-shrink: 0; font-weight: 500;
  }
  .type-video { background: rgba(255,79,79,0.12); color: #ff6b6b; }
  .type-doc { background: rgba(192,132,252,0.12); color: #c084fc; }
  .type-cours { background: rgba(255,157,0,0.12); color: #ff9d00; }
  .type-track { background: rgba(255,224,102,0.12); color: #ffe066; }
  .type-plugin { background: rgba(255,157,0,0.08); color: #ffb347; }
  .type-llm { background: rgba(111,255,176,0.10); color: #6fffb0; }
  .res-name { flex: 1; }
  .res-link { color: var(--muted); font-size: 12px; }

  .project-box {
    margin-top: 1rem; padding: 1rem;
    background: rgba(255,157,0,0.05);
    border: 0.5px solid rgba(255,157,0,0.2);
    border-radius: 10px;
  }
  .project-box-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--accent);
    margin-bottom: 6px; letter-spacing: 0.06em;
  }
  .project-box p { font-size: 13px; color: var(--muted); }

  .skills-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 0.75rem; }
  .skill-pill {
    font-size: 11px; padding: 3px 9px;
    border-radius: 20px; border: 0.5px solid var(--border2);
    color: var(--muted); font-family: 'DM Mono', monospace;
  }

  .nav-footer {
    display: flex; gap: 10px; margin-top: 2rem;
    padding-top: 1.5rem; border-top: 0.5px solid var(--border);
  }
  .btn {
    padding: 8px 18px; border-radius: 8px;
    border: 0.5px solid var(--border2);
    background: transparent; color: var(--text);
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 13px; transition: all 0.15s;
  }
  .btn:hover { background: var(--bg3); }
  .btn-primary {
    background: var(--accent); border-color: var(--accent); color: #0a0805;
    font-weight: 600;
  }
  .btn-primary:hover { background: #e08a00; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  @media(max-width: 700px) {
    .sidebar { display: none; }
    .main { padding: 1.25rem; }
    .phase-header { flex-direction: column; gap: 0.75rem; }
    .header { padding: 2rem 1rem 1.5rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-tag">BEATMAKER INTERMÉDIAIRE → LÉGENDE</div>
  <h1>Ta roadmap <span>Beatmaker</span><br>de confirmé à légendaire</h1>
  <div class="waveform" id="waveform"></div>
  <p>6 mois intensifs · FL Studio · Trap, R&B, Dancehall · depuis Madagascar — vers le monde entier.</p>
  <div class="stats-bar">
    <div class="stat"><div class="stat-n">5</div><div class="stat-l">Phases</div></div>
    <div class="stat"><div class="stat-n">24</div><div class="stat-l">Semaines</div></div>
    <div class="stat"><div class="stat-n">24</div><div class="stat-l">Projets</div></div>
    <div class="stat"><div class="stat-n">70+</div><div class="stat-l">Ressources</div></div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-row">
    <span class="progress-text" id="prog-txt">0 / 24 semaines</span>
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    <span class="xp-badge" id="xp-txt">0 XP</span>
  </div>
</div>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-label">Phases</div>
    <div id="sidebar-nav"></div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<script>
// Waveform animation
const wf = document.getElementById('waveform');
const heights = [8,14,20,28,16,24,10,18,26,12,22,30,16,20,10,24,18,14,28,12];
heights.forEach((h, i) => {
  const bar = document.createElement('div');
  bar.className = 'waveform-bar';
  bar.style.height = h + 'px';
  bar.style.animationDelay = (i * 0.07) + 's';
  wf.appendChild(bar);
});

const phases = [
  {
    id: 0,
    icon: '🎹',
    iconBg: 'rgba(255,157,0,0.12)',
    color: '#ff9d00',
    title: 'Arrangement & Structure',
    subtitle: 'Développer tes idées · Pas de drop plat',
    desc: 'Tu sais commencer un banger. Maintenant on apprend à le finir. Cette phase cible ton point faible principal : enrichir une idée de départ pour que l\'auditeur reste accroché du début à la fin.',
    tags: ['Arrangement', 'Tension', 'Drop', 'Variation'],
    tagColor: 'rgba(255,157,0,0.12)',
    tagTextColor: '#ff9d00',
    weeks: [
      {
        title: 'Anatomie d\'un hit — déconstruire pour comprendre',
        label: 'S1',
        goals: [
          'Déconstruire 5 sons référence (Trap, R&B, Dancehall) dans FL Studio',
          'Identifier chaque section : intro, verse, pre-hook, hook, bridge, outro',
          'Repérer les techniques de tension/release utilisées',
          'Cartographier l\'énergie d\'un son sur une timeline (haut/bas/pivot)'
        ],
        resources: [
          { type: 'video', name: 'How to Arrange a Beat Like a Pro — Busy Works Beats', url: 'https://www.youtube.com/watch?v=9mR2wFaE9Oo' },
          { type: 'video', name: 'Song Structure For Beatmakers — Curtiss King TV', url: 'https://www.youtube.com/watch?v=GE4oijS5zZ8' },
          { type: 'cours', name: 'FL Studio Arrangement View — Guide complet', url: 'https://www.image-line.com/fl-studio-learning/fl-studio-online-manual/html/arranger.htm' },
          { type: 'track', name: 'Référence : "Knife Talk" de Drake — analyse structure', url: 'https://www.youtube.com/watch?v=HxbFAP-YMBo' },
        ],
        project: 'Importer 3 sons référence dans FL Studio et annoter chaque section dans l\'Arrangement View. Exporter un screenshot commenté.',
        skills: ['Arrangement View', 'Song Structure', 'Référencement', 'Analyse sonore']
      },
      {
        title: 'Les 7 techniques d\'enrichissement de mélodie',
        label: 'S2',
        goals: [
          'Technique 1 : Call & Response — mélodie qui "répond" à elle-même',
          'Technique 2 : Variation rythmique — même notes, timing différent',
          'Technique 3 : Octave jump — monter ou descendre d\'une octave pour intensité',
          'Technique 4 : Contre-mélodie — 2e ligne mélodique qui complète la 1ère',
          'Technique 5 : Fill de transition — 2-4 notes avant le changement de section',
          'Technique 6 : Silence stratégique — le vide comme élément musical',
          'Technique 7 : Modulation de vélocité pour l\'expression'
        ],
        resources: [
          { type: 'video', name: 'How To Make Your Melodies More Interesting — ADSR Sounds', url: 'https://www.youtube.com/watch?v=XcSrqtAA3_Y' },
          { type: 'video', name: 'Counter Melody Tutorial FL Studio — Underbelly', url: 'https://www.youtube.com/watch?v=9E1Y3nEMqY4' },
          { type: 'cours', name: 'Melodic Development — Coursera Berklee', url: 'https://www.coursera.org/learn/music-production' },
          { type: 'track', name: 'Écoute : "Essence" de Wizkid — contre-mélodie parfaite', url: 'https://www.youtube.com/watch?v=YNJUMbFZuqA' },
        ],
        project: 'Prendre une de tes mélodies existantes et appliquer 4 techniques différentes. Exporter 4 versions et comparer.',
        skills: ['Call & Response', 'Counter Melody', 'Velocity', 'Fills']
      },
      {
        title: 'Progression harmonique & changements de section',
        label: 'S3',
        goals: [
          'Maîtriser les progressions classiques : i–VI–III–VII, ii–V–I, 1–4–5',
          'Changer la progression entre verse et hook pour créer une surprise émotionnelle',
          'Utiliser les modes (dorien, phrygien) pour la couleur exotique Afro/Dancehall',
          'Créer un pré-hook qui monte en tension avant l\'explosion du drop'
        ],
        resources: [
          { type: 'video', name: 'Chord Progressions for Trap & R&B — Manny Music', url: 'https://www.youtube.com/watch?v=6IfGBpuNIlA' },
          { type: 'cours', name: 'Hook Theory — théorie musicale interactive', url: 'https://www.hooktheory.com/theorytab' },
          { type: 'video', name: 'Phrygian Mode for Caribbean/Afro beats — explanation', url: 'https://www.youtube.com/watch?v=dDqVZe9EAHU' },
          { type: 'llm', name: 'Claude : "Génère 5 progressions d\'accords en mode dorien pour un beat afro"', url: 'https://claude.ai' },
        ],
        project: 'Créer un beat complet (2 min min.) avec au moins 2 progressions différentes entre verse et hook.',

      {

        goals: [

          'Le breakdown : enlever des éléments pour créer de l\'espace et de l\'anticipation',
          'Automatisation de paramètres pour une prod vivante (volume, reverb send, pan)'
        ],
        resources: [
          { type: 'video', name: 'How to Build Energy in Your Beats — Underbelly', url: 'https://www.youtube.com/watch?v=eZ1U3N8pJLQ' },
          { type: 'video', name: 'FL Studio Automation Tutorial — Busy Works Beats', url: 'https://www.youtube.com/watch?v=JQpfPpXUkuQ' },

  {
    id: 1,

    color: '#ff4f4f',
    title: 'Drums & Groove Avancés',

    tagColor: 'rgba(255,79,79,0.12)',
    tagTextColor: '#ff6b6b',
    weeks: [
      {
        title: 'Pattern & pocket — faire groover le kick et la snare',
        label: 'S5',
        goals: [
          'Comprendre le concept de "pocket" — jouer légèrement avant ou après le temps',
          'Humaniser les velocities dans le Step Sequencer de FL Studio',
          'Créer des variations de snare (ghost notes, rolls, snare flam)',
          'Comparer et analyser des drum patterns de Murda Beatz, Southside, Rvssian'
        ],
        resources: [
          { type: 'video', name: 'How to Make Your Drums Groove — Zen Music Group', url: 'https://www.youtube.com/watch?v=fZOt0mXN5bY' },
          { type: 'video', name: 'Ghost Notes & Humanization FL Studio — Busy Works Beats', url: 'https://www.youtube.com/watch?v=bHfQE8LQbBg' },
          { type: 'cours', name: 'Trap Drum Programming — Produce Like The Pros', url: 'https://www.youtube.com/watch?v=1gBUhHUf30k' },
          { type: 'track', name: 'Déconstruction : drums de "SICKO MODE" — Travis Scott', url: 'https://www.youtube.com/watch?v=y_mcHWxp4iY' },
        ],
        project: 'Créer 3 drum patterns différents (Trap, R&B laid back, Dancehall) avec humanisation des velocities. Tous en 8 bars minimum.',
        skills: ['Step Sequencer', 'Velocity', 'Ghost Notes', 'Pocket']
      },
      {
        title: 'Drum Design — créer tes propres 808s et snares',
        label: 'S6',
        goals: [
          'Comprendre la synthèse d\'un 808 : pitch slide, decay, saturation dans FL Studio',
          'Designer une snare signature à partir de zéro avec des samples layerisés',
          'Tuner tes 808s en fonction de la tonalité de la mélodie',
          'Créer un hi-hat pattern afro/dancehall avec le swing et le "chuga chuga"'
        ],
        resources: [
          { type: 'video', name: '808 Design From Scratch FL Studio — BrainDead Beats', url: 'https://www.youtube.com/watch?v=dR7O5Ah9mGc' },
          { type: 'video', name: 'Tune Your 808 to Your Melody — In The Mix', url: 'https://www.youtube.com/watch?v=0UmFdQZK2k8' },
          { type: 'video', name: 'Dancehall Hi-Hat Patterns FL Studio — Yaadcore', url: 'https://www.youtube.com/results?search_query=dancehall+drum+pattern+fl+studio' },
          { type: 'plugin', name: 'Plugin : Gross Beat pour les effets rythmiques', url: 'https://www.image-line.com/plugins/Effects/Gross+Beat/' },

let checked = new Set();

function xpTotal() { return checked.size * 50; }
function weeksDone() { return checked.size; }
function totalWeeks() {
  let t = 0;
  phases.forEach(p => t += p.weeks.length);
  return t;
}

function updateProgress() {
  const done = weeksDone();
  const total = totalWeeks();
  const pct = total ? (done / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = done + ' / ' + total + ' semaines';
  document.getElementById('xp-txt').textContent = xpTotal() + ' XP';
}

function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = phases.map((p, i) => {
    const done = p.weeks.every((_, wi) => checked.has(i + '-' + wi));
    const cls = (currentPhase === i ? 'active ' : '') + (done ? 'done' : '');
    const firstW = p.weeks[0].label;
    const lastW = p.weeks[p.weeks.length - 1].label;
    return `<div class="nav-item ${cls}" onclick="switchPhase(${i})">
      <div class="nav-dot"></div>
      <span style="flex:1">${p.title}</span>
      <span class="nav-weeks">${firstW}-${lastW}</span>
    </div>`;
  }).join('');
}

function typeLabel(t) {
  const map = { video:'VIDEO', doc:'DOC', cours:'COURS', track:'TRACK', plugin:'PLUGIN', llm:'CLAUDE PROMPT' };
  return map[t] || t.toUpperCase();
}

function renderPhase(idx) {
  const p = phases[idx];
  return `<div class="phase active" id="phase-${idx}">
    <div class="phase-header">
      <div class="phase-icon" style="background:${p.iconBg}">${p.icon}</div>
      <div class="phase-meta">
        <div class="phase-num">PHASE ${idx + 1} / ${phases.length}</div>
        <div class="phase-title">${p.title}</div>
        <div class="phase-desc">${p.desc}</div>
        <div class="phase-tags">
          ${p.tags.map(t => `<span class="tag" style="background:${p.tagColor};color:${p.tagTextColor}">${t}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="weeks-grid">
      ${p.weeks.map((w, wi) => renderWeek(p, idx, w, wi)).join('')}
    </div>
    <div class="nav-footer">
      <button class="btn" onclick="prevPhase()" ${idx === 0 ? 'disabled' : ''}>← Précédent</button>
      <button class="btn btn-primary" onclick="nextPhase()" ${idx === phases.length - 1 ? 'disabled' : ''}>Phase suivante →</button>
    </div>
  </div>`;
}

function renderWeek(p, pi, w, wi) {
  const id = pi + '-' + wi;
  const isChecked = checked.has(id);
  return `<div class="week-card ${isChecked ? 'completed' : ''}" id="week-card-${id}">
    <div class="week-header" onclick="toggleWeek('${id}')">
      <div class="week-check ${isChecked ? 'done' : ''}" id="chk-${id}" onclick="event.stopPropagation();toggleCheck('${id}')">
        ${isChecked ? '✓' : ''}
      </div>
      <div class="week-title">${w.title}</div>
      <span class="week-label">${w.label}</span>
      <span class="week-toggle">▾</span>
    </div>
    <div class="week-body" id="body-${id}">
      <div class="goal-list">
        ${w.goals.map(g => `<div class="goal">${g}</div>`).join('')}
      </div>
      <div class="res-section">
        <div class="res-section-title">Ressources</div>
        <div class="res-grid">
          ${w.resources.map(r => `
            <a class="res-item" href="${r.url}" target="_blank">
              <span class="res-type type-${r.type}">${typeLabel(r.type)}</span>
              <span class="res-name">${r.name}</span>
              <span class="res-link">↗</span>
            </a>`).join('')}
        </div>
      </div>
      <div class="project-box">
        <div class="project-box-title">🎯 PROJET SEMAINE</div>
        <p>${w.project}</p>
      </div>
      <div class="skills-row">
        ${w.skills.map(s => `<span class="skill-pill">${s}</span>`).join('')}
      </div>
    </div>
  </div>`;
}

function toggleWeek(id) {
  const card = document.getElementById('week-card-' + id);
  card.classList.toggle('open');
}

function toggleCheck(id) {
  if (checked.has(id)) checked.delete(id);
  else checked.add(id);
  const el = document.getElementById('chk-' + id);
  const card = document.getElementById('week-card-' + id);
  if (checked.has(id)) {
    el.classList.add('done'); el.textContent = '✓';
    card.classList.add('completed');
  } else {
    el.classList.remove('done'); el.textContent = '';
    card.classList.remove('completed');
  }
  updateProgress(); renderSidebar();
}

let currentPhase = 0;

function switchPhase(idx) {
  currentPhase = idx;
  document.getElementById('main-content').innerHTML = renderPhase(idx);
  renderSidebar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextPhase() { if (currentPhase < phases.length - 1) switchPhase(currentPhase + 1); }
function prevPhase() { if (currentPhase > 0) switchPhase(currentPhase - 1); }

renderSidebar();
switchPhase(0);
updateProgress();
</script>
</body>
</html>
